<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Uma lista de compras bonita estilo caderno que você pode acessar de qualquer dispositivo." />
  <title>Minha Lista de Compras 🛒</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e85555" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Lista de Compras" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Page background / desk surface -->
  <div class="desk-surface">

    <!-- Notebook -->
    <div class="notebook" role="main">

      <!-- Spiral binding -->
      <div class="spiral-binding" aria-hidden="true">
        <div class="spiral-hole"></div>
        <div class="spiral-hole"></div>
        <div class="spiral-hole"></div>
        <div class="spiral-hole"></div>
        <div class="spiral-hole"></div>
        <div class="spiral-hole"></div>
        <div class="spiral-hole"></div>
        <div class="spiral-hole"></div>
        <div class="spiral-hole"></div>
        <div class="spiral-hole"></div>
        <div class="spiral-hole"></div>
        <div class="spiral-hole"></div>
      </div>

      <!-- Notebook page -->
      <div class="page">

        <!-- Page header -->
        <header class="page-header">
          <div class="page-title-area">
            <h1 class="page-title">Lista de Compras</h1>
            <span class="page-date" id="current-date"></span>
          </div>
          <button class="clear-btn" id="clear-checked-btn" title="Remover todos os itens marcados">
            Limpar marcados
          </button>
        </header>

        <!-- Item list -->
        <ul class="item-list" id="item-list" aria-label="Itens da lista de compras">
          <!-- Items injected by JS -->
        </ul>

        <!-- Empty state -->
        <div class="empty-state" id="empty-state" aria-live="polite">
          <span class="empty-icon">🛒</span>
          <p>Sua lista está vazia.<br/>Adicione seu primeiro item abaixo!</p>
        </div>

        <!-- Add item row -->
        <div class="add-row">
          <div class="add-checkbox-placeholder" aria-hidden="true"></div>
          <input
            type="text"
            id="new-item-input"
            class="new-item-input"
            placeholder="Adicionar item…"
            maxlength="80"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            aria-label="Texto do novo item"
          />
          <button class="add-btn" id="add-btn" aria-label="Adicionar item">
            <span class="add-btn-icon">+</span>
          </button>
        </div>

      </div><!-- /page -->
    </div><!-- /notebook -->

    <!-- Footer hint -->
    <p class="footer-hint">Toque ✓ para marcar &nbsp;·&nbsp; Toque ✕ para remover</p>

  </div><!-- /desk-surface -->

  <script src="app.js"></script>
</body>
</html>
